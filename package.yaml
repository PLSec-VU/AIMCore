name:                uc-risc-v
version:             0.1.0.0
github:              "githubuser/uc-risc-v"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2024 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/uc-risc-v#readme>

default-extensions:
- BinaryLiterals
- DataKinds
- ExplicitNamespaces
- FlexibleContexts
- FlexibleInstances
- LambdaCase
- NumericUnderscores
- OverloadedStrings
- ScopedTypeVariables
- TemplateHaskell
- TypeApplications
- TypeOperators
- DeriveAnyClass
- DeriveGeneric
- MultiParamTypeClasses
- AllowAmbiguousTypes

dependencies:
- base >= 4.7 && < 5
- clash-prelude >= 1.8.1
- composition
- mtl >= 2.2.2
- transformers
- pretty
- tasty
- tasty-hunit
- tasty-quickcheck
- containers

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
- -fexpose-all-unfoldings
- -fplugin GHC.TypeLits.Normalise

library:
  source-dirs: src
  dependencies:
  - ghc-typelits-natnormalise

executables:
  uc-risc-v-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - uc-risc-v
    - ghc-typelits-natnormalise


tests:
  uc-risc-v-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - uc-risc-v
    - melf
    - bytestring
    - ghc-typelits-natnormalise

